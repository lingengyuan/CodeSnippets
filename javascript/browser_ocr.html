<!--
  名称: Browser OCR (Tesseract.js)
  用途: 纯前端 OCR，WebAssembly 版 Tesseract，不需要后端
  依赖: Tesseract.js v2.1.0 (CDN)
  适用场景: 浏览器端图片文字识别、截图转文字
  来源: https://simonwillison.net/guides/agentic-engineering-patterns/hoard-things-you-know-how-to-do/
  日期: 2026-03-01
-->
<!DOCTYPE html>
<html>
<head>
<title>Browser OCR</title>
<script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
<style>
body { font-family: sans-serif; max-width: 800px; margin: 2em auto; }
#preview { max-width: 100%; margin: 1em 0; }
#result { width: 100%; min-height: 200px; font-family: monospace; }
#status { color: #888; margin: 0.5em 0; }
</style>
</head>
<body>
<h1>Browser OCR</h1>
<p>选择图片，在浏览器内完成 OCR，不上传任何数据。</p>
<input type="file" id="fileInput" accept="image/*" multiple />
<div id="status"></div>
<img id="preview" />
<textarea id="result" placeholder="OCR 结果将显示在这里..."></textarea>

<script>
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const result = document.getElementById('result');
const status = document.getElementById('status');

fileInput.addEventListener('change', async (event) => {
  const files = Array.from(event.target.files);
  if (!files.length) return;

  status.textContent = '正在加载 OCR 引擎...';
  const worker = Tesseract.createWorker();
  await worker.load();
  await worker.loadLanguage('eng+chi_sim');
  await worker.initialize('eng+chi_sim');

  const allText = [];

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const url = URL.createObjectURL(file);
    preview.src = url;
    status.textContent = `正在识别 (${i + 1}/${files.length}): ${file.name}`;

    const { data: { text } } = await worker.recognize(url);
    allText.push(`── ${file.name} ──\n${text}`);
    URL.revokeObjectURL(url);
  }

  await worker.terminate();
  result.value = allText.join('\n\n');
  status.textContent = `完成，共识别 ${files.length} 张图片`;
});
</script>
</body>
</html>
